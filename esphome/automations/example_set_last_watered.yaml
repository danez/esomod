alias: Esomod set last watered
description: ""
triggers:
  - trigger: state
    entity_id:
      - binary_sensor.esomod_motor
    from: "on"
    to: "off"
conditions: []
actions:
  - action: input_datetime.set_datetime
    metadata: {}
    data:
      timestamp: "{{ now().timestamp() }}"
    target:
      entity_id: input_datetime.esomod_last_watered
mode: single
